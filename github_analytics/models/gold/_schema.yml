version: 2

models:
  - name: dim_repository
    columns:
      - name: repo_id
        tests:
          - not_null
          - unique

  - name: dim_contributor
    columns:
      - name: contributor_id
        tests:
          - not_null
          - unique

  - name: dim_date
    columns:
      - name: date_id
        tests:
          - not_null
          - unique

  - name: fact_repo_activity
    columns:
      - name: repo_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_repository')
              field: repo_id
      - name: date_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_id

  - name: scoring_repositories
    columns:
      - name: repo_id
        tests:
          - not_null
          - unique